# sh ./scripts/highlight/hl-true_coop-false1.sh 0,1,2,3 kinetics400 omniS_vit_b16_ep100 8 0 768 S-D_T-D_swin_avgcontext mean_pool
DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 256
  TEST:
    BATCH_SIZE: 256
  NUM_WORKERS: 24  ## Should be Set (Total 128)

INPUT:
  TASK: "video"
  TYPE: "tensor"
  CLIP_PREPROCESS: False
  EXPAND_TRAIN: (256, 340)
  EXPAND_TEST: (256, 340)
  SIZE: (224, 224)
  WHOLE_FRAMES: 32
  FRAMES: 8
  INTERPOLATION: "bicubic"
  TRANSFORMS: ["normalize_video"]
  PIXEL_MEAN: [0.485, 0.456, 0.406] # [0.00262479, 0.00262479, 0.00262479] # 0.0026247948526334362
  PIXEL_STD: [0.229, 0.224, 0.225] # [0.0443, 0.0443, 0.0443]

OPTIM:
  NAME: "adamw"
  LR: "8e-6"                 # Should be Set
  MAX_EPOCH: 50            # Should be Set
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 5           # Should be Set
  WARMUP_TYPE: "constant"
  WARMUP_CONS_LR: "5e-6"    # Should be Set
  WEIGHT_DECAY: 0.2        # Should be Set
  # LR: 0.0004 / Warnmup 0.00001

TRAIN:
  PRINT_FREQ: 10
  VALIDATION_FREQ: 5          # Should be Set

TEST:
  FINAL_MODEL: "best_val"  # last_step / best_val
  EVALUATOR: "Classification"
  CLIP: 5

MODEL:
  EVO:
    ENABLE: True
    ENC_OUT_DIM: 768
    DEC_TYPE: "Both"
    ENC_NAME: "omnivore_swinS"
    ACT: "gelu"
    BIAS: False
    PROMPT_INIT: "random"
    SPATIAL_IR: True
  BACKBONE:
    IMAGE:
      NAME: "ViT-B/16"
  TEMPORAL: "mean_pool" # mean_pool, temporal_attention, weighted_sum

DATASET:
  PROMPT: 'A video of _.'