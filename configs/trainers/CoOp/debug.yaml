DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 32
  TEST:
    BATCH_SIZE: 100
  NUM_WORKERS: 8

INPUT:
  TASK: "video"
  TYPE: "tensor"
  SIZE: (224, 224)
  FRAMES: 32
  INTERPOLATION: "bicubic"
  PIXEL_MEAN: [0.00262479, 0.00262479, 0.00262479] # 0.0026247948526334362
  PIXEL_STD: [0.0443, 0.0443, 0.0443]
  TRANSFORMS: ["normalize"]

OPTIM:
  NAME: "sgd"
  LR: 0.002
  MAX_EPOCH: 50
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 1
  WARMUP_TYPE: "constant"
  WARMUP_CONS_LR: 1e-5

TRAIN:
  PRINT_FREQ: 5

MODEL:
  BACKBONE:
    NAME: "ViT-B/16"